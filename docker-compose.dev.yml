services:
  backend:
    build:
      context: ./backend
    container_name: cbjay-backend-dev
    ports:
      - "8080:8080"
    environment:
      APP_FRONTEND_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/data:/app/data

  frontend:
    image: node:20-alpine
    container_name: cbjay-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: /api
      VITE_DEV_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./satisfaction-app:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend-node-modules:

