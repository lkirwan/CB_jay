name: Deploy Frontend to DigitalOcean

on:
  push:
    branches: [ main ]
    paths:
      - 'satisfaction-app/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push & deploy frontend Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate with DigitalOcean ───────────────────────────────────
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Log in to DigitalOcean Container Registry ────────────────────────
      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      # ── Build & push the image via docker compose ────────────────────────
      - name: Build Docker image
        env:
          FRONTEND_IMAGE: registry.digitalocean.com/${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}/frontend:${{ github.sha }}
        run: docker compose -f docker-compose.prod.yml build frontend

      - name: Push Docker image
        env:
          REGISTRY: registry.digitalocean.com/${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}
        run: |
          docker tag $REGISTRY/frontend:${{ github.sha }} $REGISTRY/frontend:latest
          docker push $REGISTRY/frontend:${{ github.sha }}
          docker push $REGISTRY/frontend:latest

      # ── Trigger App Platform deployment ─────────────────────────────────
      - name: Deploy to DigitalOcean App Platform
        run: doctl apps create-deployment ${{ secrets.DIGITALOCEAN_APP_ID }} --wait
