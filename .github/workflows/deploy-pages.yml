name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'satisfaction-app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: satisfaction-app/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        working-directory: satisfaction-app
        run: npm ci

      - name: Build
        working-directory: satisfaction-app
        run: npm run build -- --base=/CB_jay/
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: satisfaction-app/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
