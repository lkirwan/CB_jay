name: Deploy Backend to DigitalOcean

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-backend.yml'

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push & deploy backend Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate with DigitalOcean ───────────────────────────────────
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Log in to DigitalOcean Container Registry ────────────────────────
      - name: Log in to DOCR
        # 600 s (10 min) is sufficient to cover the docker build + push steps that follow
        run: doctl registry login --expiry-seconds 600

      # ── Build & push the image via docker compose ────────────────────────
      - name: Build Docker image
        env:
          BACKEND_IMAGE: registry.digitalocean.com/${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}/backend:${{ github.sha }}
        run: docker compose -f docker-compose.prod.yml build backend

      - name: Push Docker image
        env:
          REGISTRY: registry.digitalocean.com/${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}
        run: |
          docker tag $REGISTRY/backend:${{ github.sha }} $REGISTRY/backend:latest
          docker push $REGISTRY/backend:${{ github.sha }}
          docker push $REGISTRY/backend:latest

      # ── Trigger App Platform deployment ─────────────────────────────────
      - name: Deploy to DigitalOcean App Platform
        # --wait streams deployment progress and exits non-zero if the deployment fails,
        # surfacing the full doctl error in the Actions log.
        run: doctl apps create-deployment ${{ secrets.DIGITALOCEAN_APP_ID }} --wait

      # ── Prune old images (keep ≤ 2: latest + most-recent SHA tag) ────────
      - name: Prune old images from DOCR
        run: |
          REGISTRY_NAME="${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}"
          # List all tags except 'latest'; doctl returns them newest-first by default.
          # '|| true' prevents a non-zero exit from grep when no SHA tags exist yet.
          TAGS=$(doctl registry repository list-tags "backend" \
            --format Tag --no-header | grep -v '^latest$' || true)
          # Skip the first (newest) SHA tag; collect the rest for deletion.
          TAGS_TO_DELETE=$(echo "$TAGS" | tail -n +2)
          if [ -n "$TAGS_TO_DELETE" ]; then
            while IFS= read -r tag; do
              echo "Deleting old tag: $tag"
              doctl registry repository delete-tag "backend" "$tag" --force
            done <<< "$TAGS_TO_DELETE"
            # Reclaim storage from deleted manifests (runs after deployment is complete).
            doctl registry garbage-collection run \
              --include-untagged-manifests "$REGISTRY_NAME" --force
          fi
