name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend – lint, test & Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: satisfaction-app/package-lock.json

      - name: Install dependencies
        working-directory: satisfaction-app
        run: npm ci

      - name: Lint
        working-directory: satisfaction-app
        run: npm run lint

      - name: Test
        working-directory: satisfaction-app
        run: npm run test

      - name: Build Docker image
        run: docker build -t satisfaction-app satisfaction-app/

  backend:
    name: Backend – test & Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test
        working-directory: backend
        run: mvn --batch-mode test

      - name: Build Docker image
        run: docker build -t backend backend/
